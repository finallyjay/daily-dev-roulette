name: 🐞 Bug report
description: Report something that isn't working as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug! Please fill out the sections
        below so we can reproduce and fix it quickly.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear and concise description of the bug.
      placeholder: When I spin the roulette in demo mode, ...
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce the problem?
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen instead?
    validations:
      required: true
  - type: dropdown
    id: mode
    attributes:
      label: Which mode?
      description: Were you in demo mode or real mode (signed in with a token)?
      options:
        - Demo mode (?demo=1)
        - Real mode (signed in)
        - Not sure / both
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: Browser, OS, and whether it was local (`npm run dev`) or deployed.
      placeholder: Chrome 124 on macOS, deployed on Vercel
    validations:
      required: false
  - type: textarea
    id: extra
    attributes:
      label: Anything else?
      description: Screenshots, console errors, or other context. Do NOT paste your daily.dev API token.
    validations:
      required: false
