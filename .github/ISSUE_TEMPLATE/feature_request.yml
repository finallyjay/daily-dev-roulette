name: 💡 Feature request / new roulette mode
description: Suggest an improvement or a new roulette mode
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Got an idea for a new roulette mode or an improvement? Tell us about it!
        daily.dev's Public API exposes feeds, follows, and tech stack — all
        candidates for future modes.
  - type: textarea
    id: problem
    attributes:
      label: What's the idea?
      description: Describe the feature or roulette mode you'd like to see.
      placeholder: A "Feeds Roulette" that ...
    validations:
      required: true
  - type: textarea
    id: motivation
    attributes:
      label: Why is it useful?
      description: What problem does it solve, or what makes it fun?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other approaches you thought about?
    validations:
      required: false
